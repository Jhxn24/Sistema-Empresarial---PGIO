<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: header(~{::link})}">
    <link rel="stylesheet" th:href="@{/css/empleados.css}" />
  </head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <main class="main-content">
      <h1 class="titulo-vista">Gestión de Empleados</h1>

      <div class="tabla-contenedor">
        <table class="tabla-pgio">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nombre</th>
              <th>Cargo</th>
              <th>Departamento</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="emp : ${empleados}">
              <td th:text="${emp.codigo}" class="txt-bold">EMP-0001</td>
              <td th:text="${emp.nombre}">Nombre Apellido</td>
              <td th:text="${emp.cargo}">Puesto</td>
              <td th:text="${emp.departamento}">Área</td>
              <td th:text="${emp.email}">correo@empresa.com</td>
              <td th:text="${emp.telefono ?: '---'}">999 999 999</td>
              <td>
                <span
                  th:text="${emp.estado}"
                  th:classappend="${emp.estado == 'ACTIVO' ? 'badge-activo' : 'badge-inactivo'}"
                >
                  Estado
                </span>
              </td>
              <td>
                <div class="acciones">
                  <button class="btn-accion edit" title="Editar">✏️</button>
                  <button class="btn-accion delete" title="Desactivar">
                    🗑️
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Botón para abrir el modal -->
      <div class="acciones-cabecera">
        <button type="button" class="btn-nuevo" onclick="abrirModal()">
          <span>+</span> Añadir Empleado
        </button>
      </div>

      <div id="modalEmpleado" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Registrar Nuevo Empleado</h2>
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
          </div>
          <form
            th:action="@{/empleados/guardar}"
            th:object="${empleado}"
            method="post"
            class="form-pgio"
          >
            <div class="form-grid">
              <div class="form-group">
                <label>Nombre:</label>
                <input type="text" th:field="*{nombre}" required />
              </div>
              <div class="form-group">
                <label>Cargo:</label>
                <input type="text" th:field="*{cargo}" required />
              </div>
              <div class="form-group">
                <label>Departamento:</label>
                <input type="text" th:field="*{departamento}" required />
              </div>
              <div class="form-group">
                <label>Email:</label>
                <input type="email" th:field="*{email}" required />
              </div>
              <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" th:field="*{telefono}" />
              </div>
              <div class="form-group">
                <label>Estado:</label>
                <select th:field="*{estado}">
                  <option value="ACTIVO">Activo</option>
                  <option value="INACTIVO">Inactivo</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn-cancelar"
                onclick="cerrarModal()"
              >
                Cancelar
              </button>
              <button type="submit" class="btn-guardar">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <div th:replace="~{layout :: scripts(~{::script})}">
      <script th:src="@{/js/empleados.js}"></script>
    </div>
  </body>
</html>
