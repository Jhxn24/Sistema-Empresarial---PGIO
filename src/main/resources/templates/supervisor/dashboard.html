<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: header(~{::link})}">
    <link rel="stylesheet" th:href="@{/css/inicio.css}" />
  </head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <main class="main-content">
      <h1>Panel del Supervisor</h1>
      <p>
        Bienvenido, <strong th:text="${username}"></strong>. Desde aquí puedes
        aprobar o rechazar solicitudes.
      </p>

      <div class="stats-container">
        <div class="card-stat card-green">
          <div
            class="stat-number"
            th:text="${#lists.size(solicitudesPendientes)}"
          >
            0
          </div>
          <div>Solicitudes Pendientes</div>
        </div>
        <div class="card-stat card-orange">
          <div
            class="stat-number"
            th:text="${#lists.size(solicitudesEnRevision)}"
          >
            0
          </div>
          <div>En Revisión</div>
        </div>
      </div>

      <h2>Solicitudes Nuevas (CREADA)</h2>
      <div th:if="${#lists.isEmpty(solicitudesPendientes)}">
        <p class="mensaje-vacio">No hay solicitudes pendientes de revisión.</p>
      </div>

      <table
        class="tabla-resumen"
        th:if="${!#lists.isEmpty(solicitudesPendientes)}"
      >
        <thead>
          <tr>
            <th>Código</th>
            <th>Título</th>
            <th>Prioridad</th>
            <th>Solicitante</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="sol : ${solicitudesPendientes}">
            <td th:text="${sol.codigo}" class="codigo"></td>
            <td th:text="${sol.titulo}"></td>
            <td>
              <span
                th:text="${sol.prioridad}"
                th:classappend="${sol.prioridad == 'ALTA' ? 'badge-alta' : (sol.prioridad == 'MEDIA' ? 'badge-media' : 'badge-baja')}"
              >
              </span>
            </td>
            <td
              th:text="${sol.solicitante != null ? sol.solicitante.nombre : '-'}"
            ></td>
            <td
              th:text="${#temporals.format(sol.fechaRegistro, 'dd/MM/yyyy HH:mm')}"
            ></td>
            <td>
              <form
                th:action="@{'/supervisor/solicitudes/' + ${sol.id} + '/aprobar'}"
                method="post"
                class="form-inline"
              >
                <button type="submit" class="btn-aprobar">Aprobar</button>
              </form>
              <form
                th:action="@{'/supervisor/solicitudes/' + ${sol.id} + '/rechazar'}"
                method="post"
                class="form-inline"
              >
                <button type="submit" class="btn-rechazar">Rechazar</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <th:block th:replace="~{layout :: scripts(~{})}"></th:block>
  </body>
</html>
